app = "jarvis-pantry-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    NEXT_PUBLIC_PANTRY_API_URL = "https://pantry-api.jarvisautomation.io"

[env]
  PANTRY_API_URL = "https://pantry-api.jarvisautomation.io"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
